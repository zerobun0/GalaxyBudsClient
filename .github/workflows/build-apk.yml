name: Build GalaxyBudsClient APK

on:
  workflow_dispatch:   # lets you trigger it manually with a button

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore GalaxyBudsClient/GalaxyBudsClient.csproj

      - name: Build APK
        run: |
          dotnet publish GalaxyBudsClient/GalaxyBudsClient.csproj \
            -f net9.0-android \
            -c Release \
            -p:AndroidPackageFormats=apk \
            -p:AndroidKeyStore=false \
            --no-restore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyBudsClient-APK
          path: GalaxyBudsClient/bin/Release/net9.0-android/publish/*.apk
          retention-days: 7

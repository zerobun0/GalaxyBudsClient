name: Build GalaxyBudsClient APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Find Android project
        run: find . -name "*.csproj" | xargs grep -l "android" -i | head -20

      - name: Restore
        run: dotnet restore GalaxyBudsClient/GalaxyBudsClient.csproj

      - name: Build APK
        run: |
          dotnet publish GalaxyBudsClient/GalaxyBudsClient.csproj \
            -f net8.0-android \
            -c Release \
            -p:AndroidPackageFormats=apk \
            -p:AndroidKeyStore=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyBudsClient-APK
          path: "**/bin/Release/net8.0-android/publish/*.apk"
          retention-days: 7

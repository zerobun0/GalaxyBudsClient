name: Build GalaxyBudsClient APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Find Android csproj
        id: findproj
        run: |
          PROJ=$(grep -rl "net8.0-android\|net9.0-android" --include="*.csproj" . | head -1)
          echo "Found: $PROJ"
          echo "proj=$PROJ" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore "${{ steps.findproj.outputs.proj }}"

      - name: Build APK
        run: |
          dotnet publish "${{ steps.findproj.outputs.proj }}" \
            -c Release \
            -p:AndroidPackageFormats=apk \
            -p:AndroidKeyStore=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyBudsClient-APK
          path: "**/bin/Release/**/*.apk"
          retention-days: 7
